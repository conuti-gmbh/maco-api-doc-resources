openapi: 3.1.0
info:
  title: '[LF] START_ERHEBUNG_MESSWERTE'
  version: '202510'
  x-bpmn-source-sha: 4f5b2ff0
  x-bo4e-schema-version: 1.7.0
  x-templater-sha: c7b88c733e93fe4ee423d52cffa2cd8f312574ea
components:
  schemas:
    '[LF] START_ERHEBUNG_MESSWERTE':
      type: object
      required:
        - stammdaten
        - transaktionsdaten
        - zusatzdaten
      properties:
        stammdaten:
          oneOf:
            - $ref: ../../event-bauteil/202510/MSCONS/PI_13002.yaml#/components/schemas/PI_13002__stammdaten
            - $ref: ../../event-bauteil/202510/MSCONS/PI_13017.yaml#/components/schemas/PI_13017__stammdaten
        transaktionsdaten:
          type: object
          required:
            - absender
            - anfrageReferenz
            - empfaenger
            - kategorie
            - sparte
          properties:
            absender:
              type: object
              properties:
                rollencodenummer:
                  $ref: ../../bo4e/fields/bo/Marktteilnehmer/rollencodenummer.yaml#/components/schemas/rollencodenummer
            anfrageReferenz:
              $ref: ../../bo4e/fields/cdoc/Transaktionsdaten/anfrageReferenz.yaml#/components/schemas/anfrageReferenz
            empfaenger:
              type: object
              properties:
                rollencodenummer:
                  $ref: ../../bo4e/fields/bo/Marktteilnehmer/rollencodenummer.yaml#/components/schemas/rollencodenummer
            kategorie:
              $ref: ../../bo4e/fields/cdoc/Transaktionsdaten/kategorie.yaml#/components/schemas/kategorie
            sparte:
              $ref: ../../bo4e/fields/cdoc/Transaktionsdaten/sparte.yaml#/components/schemas/sparte
            pruefidentifikator:
              description: Wird dynamisch im Event-Prozess ermittelt (Sparte + Transaktionsgrund + Empfänger-Marktrolle). Ein vom Sender mitgegebener Wert wird ignoriert. Im Topic mögliche Prüfis — 13002, 13017.
              examples:
                - '13002'
                - '13017'
        zusatzdaten:
          type: object
          required:
            - prozessId
            - eventname
          properties:
            prozessId:
              type: string
            eventname:
              type: string
              const: START_ERHEBUNG_MESSWERTE
              default: START_ERHEBUNG_MESSWERTE
