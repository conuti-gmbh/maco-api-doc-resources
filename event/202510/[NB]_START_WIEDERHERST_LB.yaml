info:
  title: '[NB] START_WIEDERHERST_LB'
  version: '202510'
  x-bpmn-source-sha: eaf359e3
  x-bo4e-schema-version: 1.7.0
  x-templater-sha: 39ae45d481e5cc3d4d7aae328a23a9751236156a
components:
  schemas:
    '[NB] START_WIEDERHERST_LB':
      type: object
      required:
        - stammdaten
        - transaktionsdaten
        - zusatzdaten
      properties:
        stammdaten:
          oneOf:
            - $ref: ../../event-bauteil/202510/IFTSTA/PI_21039.yaml#/components/schemas/PI_21039__stammdaten
            - $ref: ../../event-bauteil/202510/IFTSTA/PI_21040.yaml#/components/schemas/PI_21040__stammdaten
        transaktionsdaten:
          type: object
          required:
            - absender
            - empfaenger
            - fertigstellungsdatum
            - sparte
          properties:
            absender:
              type: object
              properties:
                rollencodenummer:
                  $ref: ../../bo4e/fields/bo/Marktteilnehmer/rollencodenummer.yaml#/components/schemas/rollencodenummer
            empfaenger:
              type: object
              properties:
                rollencodenummer:
                  $ref: ../../bo4e/fields/bo/Marktteilnehmer/rollencodenummer.yaml#/components/schemas/rollencodenummer
            fertigstellungsdatum:
              $ref: ../../bo4e/fields/cdoc/Transaktionsdaten/fertigstellungsdatum.yaml#/components/schemas/fertigstellungsdatum
            sparte:
              $ref: ../../bo4e/fields/cdoc/Transaktionsdaten/sparte.yaml#/components/schemas/sparte
            pruefidentifikator:
              description: Wird dynamisch im Event-Prozess ermittelt (Sparte + Transaktionsgrund + Empfänger-Marktrolle). Ein vom Sender mitgegebener Wert wird ignoriert. Im Topic mögliche Prüfis — 21039, 21040.
              examples:
                - '21039'
                - '21040'
        zusatzdaten:
          type: object
          required:
            - prozessId
            - eventname
          properties:
            prozessId:
              type: string
            eventname:
              type: string
              const: START_WIEDERHERST_LB
              default: START_WIEDERHERST_LB
