                    - '55232'
                    - '55555'
                    - '55559'
                    - '55644'
                    - '55645'
                    - '55646'
                    - '55647'
                    - '55648'
        zusatzdaten:
          type: object
          required:
            - prozessId
            - eventname
          properties:
            prozessId:
              type: string
            eventname:
              type: string
              const: START_BESTELLUNG_SDAE
              default: START_BESTELLUNG_SDAE
