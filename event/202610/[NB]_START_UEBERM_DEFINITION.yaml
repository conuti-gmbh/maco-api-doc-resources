openapi: 3.1.0
info:
  title: '[NB] START_UEBERM_DEFINITION'
  version: '202610'
  x-bpmn-source-sha: 6b115946
components:
  schemas:
    '[NB] START_UEBERM_DEFINITION':
      type: object
      required:
        - stammdaten
        - transaktionsdaten
        - zusatzdaten
      properties:
        transaktionsdaten:
          allOf:
            - $ref: ../../bo4e/cdoc/Transaktionsdaten.yaml#/components/schemas/Transaktionsdaten
            - type: object
              required:
                - absender
                - empfaenger
                - sparte
              properties:
                pruefidentifikator:
                  description: Wird dynamisch im Event-Prozess ermittelt (Sparte + Transaktionsgrund + Empfänger-Marktrolle). Ein vom Sender mitgegebener Wert wird ignoriert. Im Topic mögliche Prüfis — 25005, 25008, 25009.
                  examples:
                    - '25005'
                    - '25008'
                    - '25009'
        zusatzdaten:
          type: object
          required:
            - prozessId
            - eventname
          properties:
            prozessId:
              type: string
            eventname:
              type: string
              const: START_UEBERM_DEFINITION
              default: START_UEBERM_DEFINITION
      x-pending-pruefis:
        - '25005'
        - '25008'
        - '25009'
