components:
  schemas:
    '[NB] START_BERECHNUNGSFORMEL':
      type: object
      required:
        - stammdaten
        - transaktionsdaten
        - zusatzdaten
      properties:
        stammdaten:
          oneOf:
            - $ref: ../../event-bauteil/202604/UTILTS/PI_25001.yaml#/components/schemas/PI_25001__stammdaten
        transaktionsdaten:
          type: object
          required:
            - absender
            - empfaenger
            - kategorie
            - lokationsId
            - lokationsTyp
            - sparte
          properties:
            absender:
              type: object
              properties:
                rollencodenummer:
                  $ref: ../../bo4e/fields/bo/Marktteilnehmer/rollencodenummer.yaml#/components/schemas/rollencodenummer
            empfaenger:
              type: object
              properties:
                rollencodenummer:
                  $ref: ../../bo4e/fields/bo/Marktteilnehmer/rollencodenummer.yaml#/components/schemas/rollencodenummer
            kategorie:
              $ref: ../../bo4e/fields/cdoc/Transaktionsdaten/kategorie.yaml#/components/schemas/kategorie
            lokationsId:
              $ref: ../../bo4e/fields/cdoc/Transaktionsdaten/lokationsId.yaml#/components/schemas/lokationsId
            lokationsTyp:
              $ref: ../../bo4e/fields/cdoc/Transaktionsdaten/lokationsTyp.yaml#/components/schemas/lokationsTyp
            sparte:
              $ref: ../../bo4e/fields/cdoc/Transaktionsdaten/sparte.yaml#/components/schemas/sparte
            pruefidentifikator:
              description: Wird dynamisch im Event-Prozess ermittelt (Sparte + Transaktionsgrund + Empfänger-Marktrolle). Ein vom Sender mitgegebener Wert wird ignoriert. Im Topic mögliche Prüfis — 25001.
              examples:
                - '25001'
        zusatzdaten:
          type: object
          required:
            - prozessId
            - eventname
          properties:
            prozessId:
              type: string
            eventname:
              type: string
              const: START_BERECHNUNGSFORMEL
              default: START_BERECHNUNGSFORMEL
