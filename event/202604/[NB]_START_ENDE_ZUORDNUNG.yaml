            - $ref: ../../event-bauteil/202604/UTILMD/PI_55611.yaml#/components/schemas/PI_55611__stammdaten
        transaktionsdaten:
          type: object
          required:
            - absender
            - empfaenger
            - sparte
            - transaktionsgrund
            - transaktionsgrundergaenzung
          properties:
            absender:
              type: object
              properties:
                rollencodenummer:
                  $ref: ../../bo4e/fields/bo/Marktteilnehmer/rollencodenummer.yaml#/components/schemas/rollencodenummer
            empfaenger:
              type: object
              properties:
                marktrolle:
                  $ref: ../../bo4e/fields/bo/Marktteilnehmer/marktrolle.yaml#/components/schemas/marktrolle
