              examples:
                - '55037'
                - '55611'
        zusatzdaten:
          type: object
          required:
            - prozessId
            - eventname
          properties:
            prozessId:
              type: string
            eventname:
              type: string
              const: START_ENDE_ZUORDNUNG
              default: START_ENDE_ZUORDNUNG
