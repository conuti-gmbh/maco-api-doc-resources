            - $ref: ../../event-bauteil/202604/UTILMD/PI_55007.yaml#/components/schemas/PI_55007__stammdaten
        transaktionsdaten:
          type: object
          required:
            - absender
            - empfaenger
            - freitext
            - kategorie
            - sparte
            - transaktionsgrund
            - transaktionsgrundergaenzung
          properties:
            absender:
              type: object
              properties:
                rollencodenummer:
                  $ref: ../../bo4e/fields/bo/Marktteilnehmer/rollencodenummer.yaml#/components/schemas/rollencodenummer
            empfaenger:
              type: object
              properties:
                rollencodenummer:
                  $ref: ../../bo4e/fields/bo/Marktteilnehmer/rollencodenummer.yaml#/components/schemas/rollencodenummer
            freitext:
