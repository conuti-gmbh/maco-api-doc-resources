# OpenAPI 3.1 structural ruleset for the generated BO4E specs.
# Ported 1:1 from maco-templater-app/vacuum-ruleset.yaml (Story 07 / MACO-13039)
# so the doc-resources lint gate enforces the exact same structural contract the
# templater applies at generation time. Only structural rules — no style/lint
# opinions (everything from `recommended` is turned off, then the formal
# JSON-Schema + combinator-sanity rules are re-enabled as hard errors).
extends: [[recommended, off]]
rules:
  # Formal OpenAPI 3.x JSON-Schema validation — catches every real emitter bug
  # (`type: array` without `items`, broken `$ref` fragments, invalid 3.1 syntax,
  # 3.0-only patterns under a 3.1 header).
  oas-schema-check: error
  oas3-schema: error
  oas3-valid-schema-example: error

  # Structural sanity rules that protect against malformed components.
  allof-conflicts: error
  duplicated-entry-in-enum: error
  no-unnecessary-combinator: error
  nullable-enum-contains-null: error
  oas-missing-type: error
