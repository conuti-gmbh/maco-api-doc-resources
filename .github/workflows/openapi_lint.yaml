name: OpenAPI Lint & Tooling CI

# PR gate. Two concerns, split by the branch being targeted:
#   * PRs against main          -> tooling is correct (pytest over scripts/tests)
#   * PRs against a v<format>    -> generated output is valid (vacuum + $ref check)
#
# Note: the branch-per-format topology (MACO-13087) means generated specs never
# live on main — main is tooling only. The lint half therefore runs on v*-branch
# PRs, not on main, deviating from the original "lint against main" AC wording.

on:
  pull_request:
    branches:
      - main
      - 'v*'

permissions:
  contents: read

jobs:
  tooling-tests:
    if: github.base_ref == 'main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r scripts/requirements.txt
      - run: pytest scripts/tests

  output-lint:
    if: startsWith(github.base_ref, 'v')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r scripts/requirements.txt
      - name: Check $ref consistency
        run: python -m scripts.check_refs
      - name: Install vacuum
        env:
          VACUUM_VERSION: "0.29.4"   # matches the templater webserver image
        run: |
          arch=$(dpkg --print-architecture)
          case "$arch" in
            amd64) va=linux_x86_64 ;;
            arm64) va=linux_arm64 ;;
            *) echo "::error::unsupported arch $arch"; exit 1 ;;
          esac
          curl -fsSL "https://github.com/daveshanley/vacuum/releases/download/v${VACUUM_VERSION}/vacuum_${VACUUM_VERSION}_${va}.tar.gz" \
            | sudo tar -xz -C /usr/local/bin vacuum
          sudo chmod +x /usr/local/bin/vacuum
          vacuum version
      - name: Lint specs (OpenAPI 3.1)
        run: bash scripts/lint-openapi.sh
