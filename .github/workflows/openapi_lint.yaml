name: OpenAPI Lint & Tooling CI

# PR gate. Two concerns, split by the branch being targeted:
#   * PRs against main          -> tooling is correct (pytest over scripts/tests)
#   * PRs against a v<format>    -> generated output is valid (vacuum + $ref check)
#
# Note: the branch-per-format topology (MACO-13087) means generated specs never
# live on main — main is tooling only. The lint half therefore runs on v*-branch
# PRs, not on main, deviating from the original "lint against main" AC wording.

on:
  pull_request:
    branches:
      - main
      - 'v*'

permissions:
  contents: read

jobs:
  tooling-tests:
    if: github.base_ref == 'main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r scripts/requirements.txt
      - run: pytest scripts/tests

  output-lint:
    if: startsWith(github.base_ref, 'v')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r scripts/requirements.txt
      - name: Check $ref consistency
        run: python -m scripts.check_refs
      - name: Install vacuum
        run: |
          curl -fsSL https://quobix.com/scripts/install_vacuum.sh | sh
          vacuum version
      - name: Lint specs (OpenAPI 3.1)
        run: bash scripts/lint-openapi.sh
