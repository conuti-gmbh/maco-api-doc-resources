name: Sync BO4E API Doc Resources

# Orchestrates the full doc-generation pipeline (MACO-13087):
#   templater create-openapi-spec  ->  pruefi/ + bo4e/ mirror
#   4 generator scripts            ->  event-bauteil/ + event/
#   bundle_spec.py per format      ->  one Apidog import artifact per format
# and publishes the output per format version onto its own `v<format>` branch.
#
# `main` carries only the tooling (scripts/ + bundler + this workflow). The
# generated specs live exclusively on `v<format>` branches. Formats are
# discovered dynamically from the generated output (driven by the date-versioned
# folders in the Camunda process repos): a format that no longer appears is never
# regenerated, so its branch stays frozen.
#
# PHP runs inside the templater's own `webserver` dev image (PHP 8.5 + every
# extension + composer + vacuum, bind-mounting the repo to the host) — the same
# org-approved pattern the templater CI uses. `shivammathur/setup-php` is NOT on
# the org action allow-list, so building that image is the supported route.
# Auth = ID_RSA (SSH deploy key) for private checkouts + the image build arg;
# GITHUB_TOKEN for the self-push to v<format> branches.

on:
  workflow_dispatch:
    inputs:
      templater_ref:
        description: 'Branch/tag/SHA in maco-templater-app (source of pruefi/ + bo4e/)'
        default: 'main'
        required: false
      processes_ref:
        description: 'Branch/tag/SHA in the three maco-*-processes repos (event mapping + required fields)'
        default: 'dev'
        required: false
      translator_ref:
        description: 'maco-bo4e-translator-app ref to build for the EN bundles (built from source, run locally — no ECR).'
        default: 'main'
        required: false
  # W-3: post-merge auto-trigger from the templater is prepared but unused for now.
  # repository_dispatch:
  #   types: [templater-merged]

permissions:
  contents: write  # push generated output to v<format> branches via GITHUB_TOKEN

jobs:
  generate-and-publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      DOCKER_COMPOSE: "docker compose"
      VACUUM_VERSION: "0.29.4"   # matches the templater webserver image
    steps:
      - name: Resolve refs
        id: refs
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "templater=${{ github.event.client_payload.templater_ref || 'main' }}" >> "$GITHUB_OUTPUT"
            echo "processes=${{ github.event.client_payload.processes_ref || 'dev' }}" >> "$GITHUB_OUTPUT"
          else
            echo "templater=${{ inputs.templater_ref }}" >> "$GITHUB_OUTPUT"
            echo "processes=${{ inputs.processes_ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Make ID_RSA available (image build arg)
        env:
          ID_RSA: ${{ secrets.ID_RSA }}
        run: |
          if [ -z "${ID_RSA}" ]; then
            echo "::error::ID_RSA secret is empty — templater image build + private checkouts will fail." >&2
            exit 1
          fi
          {
            echo "ID_RSA<<__EOF__"
            echo "${ID_RSA}"
            echo "__EOF__"
          } >> "$GITHUB_ENV"

      - name: Configure git
        run: |
          git config --global user.name "Github Actions Auto Sync"
          git config --global user.email "devops+github@conuti.de"

      - name: Checkout tooling (this repo)
        uses: actions/checkout@v4
        with:
          path: gen

      - name: Checkout maco-templater-app
        uses: actions/checkout@v4
        with:
          repository: conuti-gmbh/maco-templater-app
          ref: ${{ steps.refs.outputs.templater }}
          ssh-key: ${{ secrets.ID_RSA }}
          path: templater

      - name: Checkout process repos
        uses: actions/checkout@v4
        with:
          repository: conuti-gmbh/maco-lf-processes
          ref: ${{ steps.refs.outputs.processes }}
          ssh-key: ${{ secrets.ID_RSA }}
          path: repos/maco-lf-processes
      - uses: actions/checkout@v4
        with:
          repository: conuti-gmbh/maco-nb-processes
          ref: ${{ steps.refs.outputs.processes }}
          ssh-key: ${{ secrets.ID_RSA }}
          path: repos/maco-nb-processes
      - uses: actions/checkout@v4
        with:
          repository: conuti-gmbh/maco-msb-processes
          ref: ${{ steps.refs.outputs.processes }}
          ssh-key: ${{ secrets.ID_RSA }}
          path: repos/maco-msb-processes

      - name: Provision external docker network
        run: docker network create gridmako_network || true

      - name: Generate prüfi specs (templater webserver image)
        working-directory: templater
        run: |
          set -e
          # Same flow as the templater openapi_validate CI: build + up the dev
          # image (bind-mounts ./ to the container), composer install into it,
          # then run the generator. Output + vendor land on the host via the mount.
          docker compose build webserver
          docker compose up -d webserver
          make install
          docker compose exec -T webserver sh -c 'php bin/console create-openapi-spec --strict'
          count=$(find docs/api/openapi-pruefi -name '*.yaml' 2>/dev/null | wc -l)
          echo "generated $count prüfi specs"
          [ "$count" -gt 0 ] || { echo "::error::create-openapi-spec produced no specs"; exit 1; }

      - name: Capture source SHAs
        id: prov
        run: |
          echo "templater=$(git -C templater rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "lf=$(git -C repos/maco-lf-processes rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "nb=$(git -C repos/maco-nb-processes rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "msb=$(git -C repos/maco-msb-processes rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          VER=$(jq -r '.packages[] | select(.name=="conuti/bo4e-schema") | .version + "@" + (.source.reference // "?")' templater/composer.lock)
          echo "schema=${VER:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install -r gen/scripts/requirements.txt

      - name: Mirror pruefi/ and bo4e/ from templater
        run: |
          PRUEFI_SRC=templater/docs/api/openapi-pruefi
          BO4E_SRC=templater/vendor/conuti/bo4e-schema/docs/openapi-model
          [ -d "$PRUEFI_SRC" ] || { echo "::error::missing $PRUEFI_SRC"; exit 1; }
          [ -d "$BO4E_SRC" ]   || { echo "::error::missing $BO4E_SRC (bo4e-schema not installed?)"; exit 1; }
          rsync -a --delete "$PRUEFI_SRC/" gen/pruefi/
          rsync -a --delete "$BO4E_SRC/" gen/bo4e/

      - name: Run generator pipeline (1 -> 2 || 4 -> 3)
        working-directory: gen
        run: |
          python -m scripts.filter_event_bauteile
          python -m scripts.parse_bpmn_events --processes-root "$GITHUB_WORKSPACE/repos"
          python -m scripts.extract_required_from_dmn --processes-root "$GITHUB_WORKSPACE/repos"
          python -m scripts.compose_event_specs

      - name: Check $ref consistency
        working-directory: gen
        run: python -m scripts.check_refs

      - name: Install vacuum
        run: |
          arch=$(dpkg --print-architecture)
          case "$arch" in
            amd64) va=linux_x86_64 ;;
            arm64) va=linux_arm64 ;;
            *) echo "::error::unsupported arch $arch"; exit 1 ;;
          esac
          curl -fsSL "https://github.com/daveshanley/vacuum/releases/download/v${VACUUM_VERSION}/vacuum_${VACUUM_VERSION}_${va}.tar.gz" \
            | sudo tar -xz -C /usr/local/bin vacuum
          sudo chmod +x /usr/local/bin/vacuum
          vacuum version

      - name: Lint specs (OpenAPI 3.1)
        working-directory: gen
        run: bash scripts/lint-openapi.sh pruefi event-bauteil event

      - name: Discover formats
        id: formats
        working-directory: gen
        run: |
          # The templater is the authoritative format source: it emits prüfi
          # specs only for the supported versions (current + previous, plus the
          # in-build one once ready). Discover from pruefi/ ALONE — formats that
          # exist only in the process repos (e.g. a retired 202504 still carried
          # as a folder there) are NOT generated and their v<format> branches are
          # left untouched.
          FORMATS=$( ls -1 pruefi 2>/dev/null | grep -E '^[0-9]{6}$' | sort -u | tr '\n' ' ' )
          echo "Discovered formats (from pruefi/): $FORMATS"
          [ -n "$FORMATS" ] || { echo "::error::no formats discovered under pruefi/"; exit 1; }
          echo "list=$FORMATS" >> "$GITHUB_OUTPUT"

      - name: Bundle per format
        working-directory: gen
        run: |
          mkdir -p bundle
          for F in ${{ steps.formats.outputs.list }}; do
            echo "::group::bundle $F"
            python -m scripts.bundle_spec \
              --repo-root . \
              --format "$F" \
              --roots event,pruefi \
              --catalog-roots bo4e/bo,bo4e/com,bo4e/cdoc,bo4e/enum \
              --out "bundle/maco-bo4e-$F.openapi.yaml"
            echo "::endgroup::"
          done

      - name: Lint bundles
        working-directory: gen
        run: bash scripts/lint-openapi.sh bundle

      # --- EN path (Story 11 / MACO-13088): build the bo4e-translator from
      # source (Rust is preinstalled on the runner) and run it locally to
      # translate each DE bundle to EN. No ECR/IAM — only the ID_RSA checkout.
      # The translation map is taken from the templater's vendored bo4e-schema,
      # so it matches the exact version that produced the DE specs.
      - name: Checkout bo4e-translator (source)
        uses: actions/checkout@v4
        with:
          repository: conuti-gmbh/maco-bo4e-translator-app
          ref: ${{ inputs.translator_ref }}
          ssh-key: ${{ secrets.ID_RSA }}
          path: translator-src

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            translator-src/target
          key: cargo-${{ runner.os }}-${{ hashFiles('translator-src/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Build translator + translate bundles to EN
        id: translate
        working-directory: gen
        env:
          MAP: ${{ github.workspace }}/templater/vendor/conuti/bo4e-schema/translation/v1/DE_to_EN.yaml
        run: |
          [ -f "$MAP" ] || { echo "::error::translation map not found at $MAP"; exit 1; }
          # Build needs no build-args (build_info uses option_env! fallbacks) and
          # no submodule (the map is loaded at runtime, not compiled in).
          cargo build --release --manifest-path "$GITHUB_WORKSPACE/translator-src/Cargo.toml"
          TRANSLATION_MAP_PATH="$MAP" PORT=8080 \
            "$GITHUB_WORKSPACE/translator-src/target/release/bo4e-translator" &
          TPID=$!
          ok=0
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8080/api/health >/dev/null 2>&1; then ok=1; break; fi
            sleep 1
          done
          [ "$ok" = 1 ] || { echo "::error::translator not healthy"; kill "$TPID" 2>/dev/null || true; exit 1; }
          echo "image=maco-bo4e-translator-app@$(git -C "$GITHUB_WORKSPACE/translator-src" rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          for F in ${{ steps.formats.outputs.list }}; do
            echo "::group::translate $F"
            # OpenAPI route: YAML in, JSON out (Story 04). Schema/component names
            # stay DE by design; property names/descriptions/enums become EN.
            curl -fsS -X POST --data-binary "@bundle/maco-bo4e-$F.openapi.yaml" \
              -H 'Content-Type: application/yaml' \
              http://localhost:8080/api/translate/openapi/de/en/ \
              -o "bundle/maco-bo4e-$F-en.openapi.json"
            echo "::endgroup::"
          done
          kill "$TPID" 2>/dev/null || true

      - name: Lint EN bundles
        working-directory: gen
        run: |
          for f in bundle/*-en.openapi.json; do
            vacuum lint --ruleset vacuum-ruleset.yaml --no-banner --no-style --silent "$f" \
              || { echo "::error::EN bundle lint failed: $f"; exit 1; }
            echo "EN bundle OK: $f"
          done

      - name: Publish per-format branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRANSLATOR: ${{ steps.translate.outputs.image }}
          TRAILER: >-
            Generated from maco-templater-app@${{ steps.prov.outputs.templater }},
            maco-lf-processes@${{ steps.prov.outputs.lf }},
            maco-nb-processes@${{ steps.prov.outputs.nb }},
            maco-msb-processes@${{ steps.prov.outputs.msb }},
            conuti/bo4e-schema@${{ steps.prov.outputs.schema }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" publish
          for F in ${{ steps.formats.outputs.list }}; do
            echo "::group::publish v$F"
            (
              cd publish
              # Continue an existing v<format> branch (commit on top => the push
              # fast-forwards) — fresh branch off main only if it doesn't exist
              # yet. Avoids the non-fast-forward rejection of rebuilding from main.
              git checkout -B "v$F" "origin/v$F" 2>/dev/null || git checkout -B "v$F" origin/main
              # Wipe any prior output; a v<format> branch holds exactly one format.
              rm -rf bo4e pruefi event-bauteil event bundle
              mkdir -p pruefi event-bauteil event bundle
              cp -r "../gen/bo4e" "./bo4e"
              # A format may exist in only one dimension (e.g. retired from the
              # templater registry but still carried in the process repos as
              # stub events, or vice versa) — copy each part only if present.
              [ -d "../gen/pruefi/$F" ]        && cp -r "../gen/pruefi/$F"        "./pruefi/$F"        || echo "note: no pruefi/ for $F"
              [ -d "../gen/event-bauteil/$F" ] && cp -r "../gen/event-bauteil/$F" "./event-bauteil/$F" || echo "note: no event-bauteil/ for $F"
              [ -d "../gen/event/$F" ]         && cp -r "../gen/event/$F"         "./event/$F"         || echo "note: no event/ for $F"
              cp "../gen/bundle/maco-bo4e-$F.openapi.yaml" "./bundle/"
              [ -f "../gen/bundle/maco-bo4e-$F-en.openapi.json" ] && cp "../gen/bundle/maco-bo4e-$F-en.openapi.json" "./bundle/" || echo "note: no EN bundle for $F"
              git add -A
              if git diff --cached --quiet; then
                echo "v$F: no changes"
              else
                msg="$TRAILER"
                [ -n "${TRANSLATOR:-}" ] && msg="$msg, $TRANSLATOR"
                git commit -m "Sync v$F" -m "$msg"
                git push -u origin "v$F"
              fi
            )
            echo "::endgroup::"
          done
